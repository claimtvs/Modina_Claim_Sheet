
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TVS Claim Data</title>
<style>
body{font-family:Arial,sans-serif;background:#eef2f5;margin:0}
.banner{background:#173b8f;color:#fff;padding:18px;text-align:center;font-size:28px;font-weight:bold}
.wrap{max-width:820px;margin:20px auto;padding:16px}
.card{background:#fff;border-radius:10px;padding:24px;box-shadow:0 4px 12px rgba(0,0,0,.12);animation:fade .5s}
label{display:block;margin-top:14px;font-weight:bold}
input,textarea{width:100%;padding:10px;margin-top:6px;border:1px solid #ccc;border-radius:6px;box-sizing:border-box}
.buttons{display:flex;justify-content:space-between;margin-top:22px}
button{background:#1a73e8;color:#fff;border:none;padding:10px 24px;border-radius:6px;cursor:pointer}
button:hover{background:#1558b0}
.hidden{display:none}
.progress{height:8px;background:#ddd;border-radius:5px;margin-bottom:15px;overflow:hidden}
.bar{height:100%;width:50%;background:#1a73e8;transition:.4s}
.preview img{width:120px;height:120px;object-fit:cover;margin:6px;border-radius:8px;border:1px solid #ccc}
@keyframes fade{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:none}}
</style>
<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
</head>
<body>
<div class="banner">TVS CLAIM DATA - MODINA AUTO PARTS LTD.</div>
<div class="wrap">
<div class="progress"><div class="bar" id="bar"></div></div>

<form id="claimForm">

<div id="s1" class="card">
<h2>Section 1 - Claim Information</h2>

<label>Part Number *</label>
<input
type="text"
id="partNumber"
name="partNumber"
required>

<label>Delivery No *</label>
<input
type="text"
id="deliveryNo"
name="deliveryNo"
required>

<label>Box Weight *</label>
<input
type="text"
id="boxWeight"
name="boxWeight"
required>

<label>Case Number / Packing Number *</label>
<input
type="text"
id="caseNumber"
name="caseNumber"
required>

<label>Claim Reason *</label>
<textarea
id="claimReason"
name="claimReason"
required></textarea>

<div class="buttons">
<span></span>
<button type="button" onclick="nextStep()">Next</button>
</div>
</div>
<div id="s2" class="card hidden">
<h2>Section 2 - Image Upload</h2>
<label>Product Image *</label>
<label>Product Image *</label>
<input
    type="file"
    id="productImage"
    name="productImage"
    accept="image/*"
    capture="environment"
    onchange="preview(this,'p1')"
    required>

<div class="preview" id="p1"></div>

<label>Sticker Label Image *</label>
<input
    type="file"
    id="stickerImage"
    name="stickerImage"
    accept="image/*"
    capture="environment"
    onchange="preview(this,'p2')"
    required>

<div class="preview" id="p2"></div>

<label>Master Cartons Sticker Image *</label>
<input
    type="file"
    id="cartonImage"
    name="cartonImage"
    accept="image/*"
    capture="environment"
    onchange="preview(this,'p3')"
    required>

<div class="preview" id="p3"></div>
<div class="buttons">
<button type="button" onclick="backStep()">Back</button>
<button type="submit" id="submitBtn">
    Submit
</button></div>
</div>

</form>
</div>

<script>
function nextStep(){
document.getElementById('s1').classList.add('hidden');
document.getElementById('s2').classList.remove('hidden');
document.getElementById('bar').style.width='100%';
window.scrollTo({top:0,behavior:'smooth'});
}
function backStep(){
document.getElementById('s2').classList.add('hidden');
document.getElementById('s1').classList.remove('hidden');
document.getElementById('bar').style.width='50%';
}
function preview(inp,id){
const c=document.getElementById(id); c.innerHTML='';
[...inp.files].forEach(f=>{
 const r=new FileReader();
 r.onload=e=>{let i=document.createElement('img');i.src=e.target.result;c.appendChild(i);}
 r.readAsDataURL(f);
});
}
// ======================
// IMAGE COMPRESSION
// ======================

async function compressImage(file){

    const options = {
        maxSizeMB:0.2,
        maxWidthOrHeight:1600,
        useWebWorker:true,
        initialQuality:0.8
    };

    const compressed = await imageCompression(file,options);

    return compressed;

}

function fileToBase64(file){

    return new Promise((resolve,reject)=>{

        const reader=new FileReader();

        reader.onload=()=>resolve(reader.result);

        reader.onerror=error=>reject(error);

        reader.readAsDataURL(file);

    });

}


// ======================
// FORM SUBMIT
// ======================

document
.getElementById("claimForm")
.addEventListener("submit",async function(e){

e.preventDefault();

const btn=document.getElementById("submitBtn");

btn.disabled=true;

btn.innerHTML="Uploading...";

try{

const product=
await compressImage(
document.getElementById("productImage").files[0]);

const sticker=
await compressImage(
document.getElementById("stickerImage").files[0]);

const carton=
await compressImage(
document.getElementById("cartonImage").files[0]);

const data={

partNumber:
document.getElementById("partNumber").value,

deliveryNo:
document.getElementById("deliveryNo").value,

boxWeight:
document.getElementById("boxWeight").value,

caseNumber:
document.getElementById("caseNumber").value,

claimReason:
document.getElementById("claimReason").value,

productImage:
await fileToBase64(product),

stickerImage:
await fileToBase64(sticker),

masterCartonImage:
await fileToBase64(carton)

};

const response = await fetch(
"https://script.google.com/macros/s/AKfycbxFrPjXsw-P3T3XKSiiD6aY4odASRqtnU--ImFG5ReLnhz5_ksq7F0m0Ja47eDFMC7K/exec",
{
method:"POST",
body:JSON.stringify(data)
});

const result=await response.json();

if(result.status==="success"){

alert(
"Claim Submitted Successfully\n\nClaim ID : "
+result.claimId);

document.getElementById("claimForm").reset();

location.reload();

}
else{

alert(result.message);

}

}catch(err){

alert(err);

}

btn.disabled=false;

btn.innerHTML="Submit";

});
</script>
</body>
</html>
